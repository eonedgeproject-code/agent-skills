name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skills, commands, agents & manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate structure
        run: python3 scripts/validate.py

      - name: Unit-test the validator
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v

      - name: Shellcheck hooks (Claude Code + Gemini CLI)
        run: shellcheck .claude/hooks/*.sh plugins/gemini/.agents/hooks/*.sh

      - name: Validate JSON manifests with jq
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                   hooks/hooks.json plugins/gemini/hooks.json opencode.json; do
            jq empty "$f" && echo "ok: $f"
          done

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build-check the OpenCode plugin
        run: bun build .opencode/plugins/eonedge-skills.ts --target=node > /dev/null
